<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Deadline Alert</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px;">
        <h2 style="color: #1B4F8A;">Board Meeting Minutes Manager</h2>
        <p>Dear <strong th:text="${recipientName}">User</strong>,</p>
        <p>This is a deadline alert for the following meeting:</p>
        <div style="background-color: #fff3cd; padding: 15px; border-radius: 5px; margin: 15px 0;">
            <strong th:text="${meetingTitle}">Meeting Title</strong>
        </div>
        <p>Please ensure the meeting minutes are completed before the deadline.</p>
        <a href="http://localhost"
           style="background-color: #1B4F8A; color: white; padding: 10px 20px;
                  text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px;">
            Go to Dashboard
        </a>
        <p style="margin-top: 20px; color: #888; font-size: 12px;">
            This is an automated alert from Board Meeting Minutes Manager.
        </p>
    </div>
</body>
</html>
